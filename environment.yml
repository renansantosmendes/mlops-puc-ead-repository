name: mlops-env
channels:
  - conda-forge
  - defaults
dependencies:
  # Python e ferramentas básicas
  - python=3.12
  - pip
  - git
  - curl

  # Pacotes científicos via conda (melhor performance)
  - numpy=2.1.3
  - pandas=2.2.3
  - matplotlib=3.10.6
  - scikit-learn=1.5.2

  # Deep Learning
  - tensorflow=2.21.0

  # Jupyter para desenvolvimento
  - jupyter
  - jupyterlab

  # Pacotes pip específicos
  - pip:
      - -r requirements.txt